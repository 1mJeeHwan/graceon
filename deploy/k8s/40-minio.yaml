# MinIO (S3-compatible object storage) — Deployment + a PersistentVolumeClaim for object data,
# plus a one-shot Job that creates the media bucket and opens anonymous read on the hls/ prefix
# (encrypted segments), mirroring the compose minio-init.
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: streamhub
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: streamhub
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: streamhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: "streamhub"
            - name: MINIO_ROOT_PASSWORD
              value: "streamhub123"
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: streamhub
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - >
              until mc alias set local http://minio:9000 streamhub streamhub123; do sleep 3; done &&
              mc mb --ignore-existing local/streamhub-media &&
              mc anonymous set download local/streamhub-media/hls &&
              echo 'bucket ready'
