# streamhub-notification-service — Deployment + Service. Consumes the notification-dispatch topic and
# owns the streamhub_notification schema; serves GET /v1/notification-dispatches. The monolith emits
# dispatches when NOTIFICATION_DISPATCH=true. Image built from the service Dockerfile + loaded locally.
apiVersion: v1
kind: Service
metadata:
  name: streamhub-notification-service
  namespace: streamhub
spec:
  selector:
    app: streamhub-notification-service
  ports:
    - port: 8091
      targetPort: 8091
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamhub-notification-service
  namespace: streamhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamhub-notification-service
  template:
    metadata:
      labels:
        app: streamhub-notification-service
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka 29092; do echo waiting for kafka; sleep 2; done"]
      containers:
        - name: streamhub-notification-service
          image: streamhub-notification-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: "mysql"
            - name: DB_NAME
              value: "streamhub_notification"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: TZ
              value: "Asia/Seoul"
          ports:
            - containerPort: 8091
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8091
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8091
            initialDelaySeconds: 60
            periodSeconds: 15
