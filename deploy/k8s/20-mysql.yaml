# MySQL as a StatefulSet — the right primitive for stateful workloads: stable network identity
# (mysql-0.mysql) and a per-replica PersistentVolume via volumeClaimTemplates that survives restarts.
# The headless Service (clusterIP: None) named "mysql" gives the API a stable DNS name to dial.
#
# The init ConfigMap below is mounted at /docker-entrypoint-initdb.d so MySQL creates the per-service
# schemas (streamhub_audit / streamhub_notification) on first boot — DB-per-service for the MSA split.
apiVersion: v1
kind: ConfigMap
metadata:
  name: streamhub-mysql-init
  namespace: streamhub
data:
  01-create-service-dbs.sql: |
    CREATE DATABASE IF NOT EXISTS streamhub_audit
        CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    GRANT ALL PRIVILEGES ON streamhub_audit.* TO 'streamhub'@'%';
    CREATE DATABASE IF NOT EXISTS streamhub_notification
        CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    GRANT ALL PRIVILEGES ON streamhub_notification.* TO 'streamhub'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: streamhub
spec:
  clusterIP: None          # headless — DNS resolves to the pod(s)
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: streamhub
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root"
            - name: MYSQL_DATABASE
              value: "streamhub"
            - name: MYSQL_USER
              value: "streamhub"
            - name: MYSQL_PASSWORD
              value: "streamhub"
            - name: TZ
              value: "Asia/Seoul"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h localhost -uroot -proot"]
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h localhost -uroot -proot"]
            initialDelaySeconds: 45
            periodSeconds: 10
      volumes:
        - name: init
          configMap:
            name: streamhub-mysql-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
