# streamhub-audit-service — Deployment + Service. Consumes the action-log topic and owns the
# streamhub_audit schema (created by the mysql init ConfigMap); serves GET /v1/action-logs. The
# monolith reaches it at http://streamhub-audit-service:8090 (set ACTIONLOG_SOURCE=remote +
# AUDIT_SERVICE_URL on the api). Image built from streamhub-audit-service/Dockerfile + loaded locally.
apiVersion: v1
kind: Service
metadata:
  name: streamhub-audit-service
  namespace: streamhub
spec:
  selector:
    app: streamhub-audit-service
  ports:
    - port: 8090
      targetPort: 8090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamhub-audit-service
  namespace: streamhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamhub-audit-service
  template:
    metadata:
      labels:
        app: streamhub-audit-service
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka 29092; do echo waiting for kafka; sleep 2; done"]
      containers:
        - name: streamhub-audit-service
          image: streamhub-audit-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: "mysql"
            - name: DB_NAME
              value: "streamhub_audit"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: TZ
              value: "Asia/Seoul"
          ports:
            - containerPort: 8090
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 15
