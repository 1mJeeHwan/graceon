# Non-secret runtime config for the API. SPRING_PROFILES_ACTIVE=docker reuses application-docker.yml,
# whose hostnames (mysql/redis/minio/localstack) match the Service names in this namespace — so the
# DB/Redis/MinIO/SQS wiring needs no extra env. Only the secret + a couple toggles live here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: streamhub-config
  namespace: streamhub
data:
  SPRING_PROFILES_ACTIVE: "docker"
  EVENTLOG_TRANSPORT: "sqs"        # sqs(localstack) | kafka (add the kafka manifest first)
  JPA_DDL_AUTO: "update"           # demo: self-create schema; seeders are idempotent
  APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"
---
# Secrets. Replace the placeholder values (or create with `kubectl create secret`). stringData is
# auto base64-encoded by the API server. NEVER commit real values (this file ships placeholders).
apiVersion: v1
kind: Secret
metadata:
  name: streamhub-secret
  namespace: streamhub
type: Opaque
stringData:
  JWT_SECRET: "REPLACE-with-openssl-rand-base64-48"
  # Optional external-integration keys — leave empty to run in mock/seed mode.
  CHAT_LLM_API_KEY: ""                    # Gemini AI 챗봇 (비우면 rule 폴백)
  CHURCH_GEOCODE_KAKAO_REST_KEY: ""       # 교회찾기 실연동 (비우면 seed)
